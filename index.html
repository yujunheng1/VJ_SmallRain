<script type="module">
import * as THREE from './vendor/three.module.js';
import {createLyricParticleLine} from './src/lyricParticles.js';
import {sectionAt, env, curve, DINGS, THUNDER, STORM, WINDC, NIGHTC, narrative, boltWindow} from './src/timeline.js';
import {EYE_FULL, BFLY_PT, GLSL_SIM_NOISE, TORNADO_PT} from './src/shaderChunks.js?v=20260705-tornado';
import {createWeatherMaterials} from './src/weatherMaterials.js';
import {createFinalButterflyAssets} from './src/finalButterflyAssets.js';
import {createGalaxyAssets} from './src/galaxyAssets.js';

/* ---------- JS value noise (terrain) ---------- */
const h2=(x,y)=>{const s=Math.sin(x*127.1+y*311.7)*43758.5453;return s-Math.floor(s);};
function noise2(x,y){const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi,
 u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
 return h2(xi,yi)*(1-u)*(1-v)+h2(xi+1,yi)*u*(1-v)+h2(xi,yi+1)*(1-u)*v+h2(xi+1,yi+1)*u*v;}
const riverX=z=>Math.sin(z*.017)*1.7+Math.sin(z*.0065+1.4)*1.0
                +Math.sin(z*.041)*.45;    // 河道蜿蜒中心线：两长弯叠一点小摆
function groundH(x,z){
 const dx=x-riverX(z);                     // 相对河道中心的横距（河道随 z 蜿蜒）
 const n=noise2(x*.15,z*.15)*1.4+noise2(x*.05,z*.05)*3.2;
 const valley=Math.pow(Math.abs(x)/15,2)*7.0;
 const river=-1.7*Math.exp(-(dx*dx)/6.5);
 const h=n*.55+valley+river;
 const carve=Math.exp(-(dx*dx)/14.6)*.85;  // 河槽压平：中心恒低于水面(-.35)，随河蜿蜒
 return h*(1-carve)-1.15*carve;
}
const pathX=z=>riverX(z)+3.1+Math.sin(z*.03)*1.0+Math.sin(z*.011)*1.1;  // 步道贴着河岸走

/* ============================================================
   renderer / scene
============================================================ */
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x9fc4a8,0.016);
const camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.1,900);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
 if(post.rtS){const D2=Math.min(devicePixelRatio,2);
  post.rtS.setSize(innerWidth*D2,innerHeight*D2);
  post.rtA.setSize(innerWidth*D2>>1,innerHeight*D2>>1);
  post.rtB.setSize(innerWidth*D2>>1,innerHeight*D2>>1);
  post.rtC.setSize(innerWidth*D2>>2,innerHeight*D2>>2);
  post.rtD.setSize(innerWidth*D2>>2,innerHeight*D2>>2);
  post.rtH1.setSize(innerWidth*D2,innerHeight*D2);
  post.rtH2.setSize(innerWidth*D2,innerHeight*D2);}});

/* lights */
const hemi=new THREE.HemisphereLight(0xcfe8d0,0x0a2015,0.9); scene.add(hemi);
const sunDir=new THREE.Vector3(0.35,0.55,-0.75).normalize();     // 常规/夜晚月位
const sunEve=new THREE.Vector3(0.40,0.30,-0.86).normalize();     // 苗寨段：低而不压地平的金色夕阳(~18°)
const sunNow=new THREE.Vector3().copy(sunDir);                   // 每帧混合的实际日位
const sun=new THREE.DirectionalLight(0xfff2cc,1.3); scene.add(sun); scene.add(sun.target);
const flash=new THREE.DirectionalLight(0xd9c4ff,0);
flash.position.set(0,1,0); scene.add(flash); scene.add(flash.target);

/* shared GLSL noise */
const GLSL_NOISE=`
float hashg(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noiseg(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
 float a=hashg(i),b=hashg(i+vec2(1,0)),c=hashg(i+vec2(0,1)),d=hashg(i+vec2(1,1));
 return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
float fbmg(vec2 p){float v=0.,a=.5;
 for(int i=0;i<6;i++){v+=a*noiseg(p);p=mat2(.8,-.6,.6,.8)*p*2.03+vec2(11.3,7.1);a*=.52;}return v;}
`;

/* ============================================================
   sky dome — living sun/moon, clouds, day↔night 活的天空
============================================================ */
const skyU={uT:{value:0},uNight:{value:0},uStorm:{value:0},uSec:{value:0},
 uMid:{value:0},uBeat:{value:0},uBolt:{value:0},uDanger:{value:0},
 uVil:{value:0},uVil2:{value:0},uPurple:{value:0},uClear:{value:0},uSea:{value:0},
 uSunDir:{value:sunDir.clone()}};
const sky=new THREE.Mesh(new THREE.SphereGeometry(700,48,24),new THREE.ShaderMaterial({
 side:THREE.BackSide,depthWrite:false,fog:false,uniforms:skyU,
 vertexShader:`varying vec3 vDir;void main(){vDir=position;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
 fragmentShader:GLSL_NOISE+`
 varying vec3 vDir;
 uniform float uT,uNight,uStorm,uSec,uMid,uBeat,uBolt,uDanger,uVil,uVil2,uPurple,uClear,uSea;
 uniform vec3 uSunDir;
 void main(){
  vec3 dir=normalize(vDir);
  float night=uNight, storm=uStorm;
  vec3 deep=mix(vec3(.10,.24,.15),vec3(.012,.075,.048),night);
  deep=mix(deep,vec3(.24,.36,.58),uVil);          // 苗寨段：明亮的蓝紫天顶(冷色锚点，与暖地平成对比)
  deep=mix(deep,vec3(.05,.10,.20),uVil2);         // 第二段(雨谷)：旧村庄暮蓝靛青天顶
  deep=mix(deep,vec3(.004,.02,.016),uDanger);
  vec3 mist=mix(vec3(.72,.86,.74),vec3(.40,.60,.50),night);
  mist=mix(mist,vec3(1.15,.72,.42),uVil);         // 夕阳橙金地平(提亮)
  mist=mix(mist,vec3(.42,.47,.62),uVil2);         // 第二段：暮霭蓝紫地平
  mist=mix(mist,vec3(.15,.23,.21),uDanger*.8);
  vec3 silver=mix(vec3(1.,.95,.80),vec3(.78,.88,.90),night);
  silver=mix(silver,vec3(1.15,.90,.60),uVil*.6);  // 夕阳暖金(提亮)
  silver=mix(silver,vec3(1.,.86,.62),uVil2*.6);   // 第二段：暖色暮月
  // gradient
  float hz=max(dir.y,0.);
  vec3 col=mix(mist*(.7+.3*uSec), deep*.9, pow(hz,.55));
  col*=1.-.25*storm*hz;
  // sun basis
  vec3 su=normalize(cross(uSunDir,vec3(0.,1.,0.)));
  vec3 sv=cross(su,uSunDir);
  float px=dot(dir,su),py=dot(dir,sv),pz=dot(dir,uSunDir);
  if(pz>0.){
   vec2 p=vec2(px,py)*3.2;
   float md=length(p);
   float lang=atan(p.y,p.x);
   float lightAmt=(.35+.75*uSec+.25*uMid+.5*(1.-night))*(1.-uDanger*.75)*(1.-storm*.3);
   float limb=fbmg(vec2(lang*2.2,uT*.2)*2.);
   float R=mix(.19,.15,night);
   float Reff=R*(1.+(limb-.5)*mix(.12,.04,night));
   float disc=smoothstep(Reff+.012,Reff-.012,md);
   vec2 sq=p/R;
   float gran=fbmg(sq*5.+vec2(uT*.07,-uT*.05));
   float mare=fbmg(sq*3.2+17.)+.4*fbmg(sq*8.+31.);
   vec3 sunS=mix(vec3(1.06,.99,.84),vec3(1.,.7,.42),smoothstep(.15,1.,md/R))*(.82+.32*gran);
   vec3 moonS=silver*(.68+.38*smoothstep(.45,.95,mare))*(1.-.28*smoothstep(.7,1.,md/R));
   col=mix(col,mix(sunS,moonS,night)*(1.+.5*uSec),disc*(1.-uDanger*.85)*(1.-storm*.3));
   float cor=fbmg(vec2(lang*3.+sin(uT*.05)*2.,md*4.-uT*.38));
   cor=pow(max(cor-.22,0.)*1.7,2.);
   col+=mix(vec3(1.,.85,.52),silver,night)*cor*exp(-(md-Reff)*mix(3.,4.5,night))
      *step(Reff*.9,md)*lightAmt*(.7+.6*uMid+.5*uBeat);
   float fray=pow(.5+.5*sin(lang*8.+uT*.11),4.)+pow(.5+.5*sin(lang*3.-uT*.07+1.7),6.)*.7;
   col+=silver*fray*exp(-md*mix(.9,1.2,night))*lightAmt*.30;
   col+=silver*exp(-md*md*2.2)*lightAmt*.7;
  }
  // domain-warped clouds
  vec2 cq=dir.xz/(dir.y+.28)*1.4+vec2(uT*.006,0.);
  vec2 wq=vec2(fbmg(cq*1.4+vec2(0.,uT*.012)),fbmg(cq*1.4+vec2(5.2,1.3)));
  float cl=fbmg(cq+wq*1.7);
  float clm=smoothstep(.40-storm*.14,.80-storm*.18,cl)*smoothstep(.02,.25,dir.y);
  vec3 cloudCol=mix(deep*(1.25-storm*.45),silver*.5,exp(-length(vec2(px,py))*2.)* (pz>0.?1.:0.) *.8);
  col=mix(col,cloudCol,clm*(.5+.28*storm)*(1.-uClear*.92));   // 天光消散时云散去
  // lightning flash — violet wash 紫色暴雨闪光
  col+=vec3(.78,.60,1.08)*uBolt*.35;
  // 忽而雷声隐隐 — the whole sky bruises violet 巨雷后天泛紫
  col=mix(col,col*vec3(1.08,.80,1.45)+vec3(.13,.05,.28),uPurple*.65);
  // 「吞入海底」— 整片天沉入深海的幽蓝
  col=mix(col,vec3(.004,.030,.055),uSea*.6);
  // 终章：天光消散，露出深空，让银河浮现
  col=mix(col,vec3(.008,.011,.030),uClear*.80);
  gl_FragColor=vec4(col,1.);
 }`}));
scene.add(sky);
{ // 星野 stars — fade in with the night, hide in the storm; 星等幂律分布 终章天光消散后更深邃
 const NS=24000,pos=new Float32Array(NS*3),rr=new Float32Array(NS);
 for(let i=0;i<NS;i++){
  const a=Math.random()*6.283,y=.04+Math.pow(Math.random(),.7)*.92;
  const r=Math.sqrt(Math.max(1-y*y,0));
  pos[i*3]=Math.cos(a)*r*640;pos[i*3+1]=y*640;pos[i*3+2]=Math.sin(a)*r*640;
  rr[i]=Math.random();
 }
 const g=new THREE.BufferGeometry();
 g.setAttribute('position',new THREE.BufferAttribute(pos,3));
 g.setAttribute('aR',new THREE.BufferAttribute(rr,1));
 const m=new THREE.ShaderMaterial({transparent:true,depthWrite:false,fog:false,
  blending:THREE.AdditiveBlending,
  uniforms:{uT:skyU.uT,uNight:skyU.uNight,uStorm:skyU.uStorm,uClear:skyU.uClear,
   uPR:{value:devicePixelRatio}},
  vertexShader:`
  attribute float aR;
  uniform float uPR;
  varying float vR;
  void main(){
   gl_PointSize=(.8+pow(aR,6.)*3.8)*uPR;               // 幂律: 多数极暗 少数亮星
   vR=aR;
   gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
  }`,
  fragmentShader:`
  uniform float uT,uNight,uStorm,uClear;
  varying float vR;
  void main(){
   vec2 q=gl_PointCoord-.5;
   float m=smoothstep(.5,.1,length(q));
   float tw=.55+.45*sin(uT*(1.+vR*3.)+vR*40.);
   float mag=.06+.94*pow(vR,5.);                       // 星等分布: 暗星如尘
   float a=uNight*(1.-uStorm*.65)*tw*mag*(1.+uClear*1.2); // 天光消散→夜空更深星更显
   vec3 tint=mix(vec3(.72,.8,1.),vec3(1.,.9,.72),step(.8,fract(vR*7.))); // 冷暖星色
   gl_FragColor=vec4(tint*m*a,1.);
  }`});
 const st=new THREE.Points(g,m);
 st.frustumCulled=false;sky.add(st);
}
{ // 银河带 Milky Way band — 横贯天幕的暗淡星带 与夜同现 风暴中隐 终章更明
 const NB=160000,pos=new Float32Array(NB*3),cA=new Float32Array(NB*3),rr=new Float32Array(NB);
 const eu=new THREE.Euler(-.95,0,.35),v=new THREE.Vector3();
 const gs=()=>(Math.random()+Math.random()+Math.random()-1.5)/1.5;
 for(let i=0;i<NB;i++){
  let t,off;
  do{t=Math.random()*6.283;off=gs()*.16;               // 沿大圆 + 高斯离面散布
   v.set(Math.cos(t),off,Math.sin(t)).normalize().applyEuler(eu);
  }while(v.y<.03);                                     // 只留地平线上
  pos[i*3]=v.x*636;pos[i*3+1]=v.y*636;pos[i*3+2]=v.z*636;
  const den=Math.pow(Math.abs(Math.sin(t*1.35+.7))*.5+Math.abs(Math.sin(t*3.1))*.5,1.5); // 疏密成絮
  const wb=Math.exp(-(t-4.2)*(t-4.2)*2);               // 近"银心"段 更暖更密
  let br=(.018+.05*Math.random())*(.3+.7*den)*(1+wb*1.4);
  let sz=.7+Math.random()*1.3;
  if(Math.random()<.03){br*=4;sz*=1.6;}                // 带中偶有亮星
  const warm=Math.min(wb+Math.random()*.2,1);
  cA[i*3]=(.78+.22*warm)*br;cA[i*3+1]=(.85+.0*warm)*br;cA[i*3+2]=(1.-.35*warm)*br;
  rr[i]=sz;
 }
 const g=new THREE.BufferGeometry();
 g.setAttribute('position',new THREE.BufferAttribute(pos,3));
 g.setAttribute('aC',new THREE.BufferAttribute(cA,3));
 g.setAttribute('aR',new THREE.BufferAttribute(rr,1));
 const m=new THREE.ShaderMaterial({transparent:true,depthWrite:false,fog:false,
  blending:THREE.AdditiveBlending,
  uniforms:{uT:skyU.uT,uNight:skyU.uNight,uStorm:skyU.uStorm,uClear:skyU.uClear,
   uPR:{value:devicePixelRatio}},
  vertexShader:`
  attribute vec3 aC;
  attribute float aR;
  uniform float uPR;
  varying vec3 vC;
  void main(){
   gl_PointSize=aR*uPR;
   vC=aC;
   gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
  }`,
  fragmentShader:`
  uniform float uT,uNight,uStorm,uClear;
  varying vec3 vC;
  void main(){
   vec2 q=gl_PointCoord-.5;
   float m=smoothstep(.5,.08,length(q));
   float a=uNight*(1.-uStorm*.8)*(.5+.9*uClear);       // 平日隐约 终章天净时星带尽显
   gl_FragColor=vec4(vC*m*a,1.);
  }`});
 const st=new THREE.Points(g,m);
 st.frustumCulled=false;sky.add(st);
}

/* ============================================================
   terrain 河谷地形
============================================================ */
let terrainU=null;
{
 const W=150,L=420,SW=90,SL=240;
 const g=new THREE.PlaneGeometry(W,L,SW,SL);
 g.rotateX(-Math.PI/2);
 const pos=g.attributes.position,colors=[];
 const c1=new THREE.Color(0x14301e),c2=new THREE.Color(0x2a4d2e),c3=new THREE.Color(0x0b1f14);
 for(let i=0;i<pos.count;i++){
  const x=pos.getX(i),z=pos.getZ(i)-170;
  pos.setZ(i,z); // shift strip: z from +40 .. -380
  const h=groundH(x,z);
  pos.setY(i,h);
  const n=noise2(x*.4,z*.4);
  const col=c1.clone().lerp(c2,n).lerp(c3,Math.min(Math.abs(x)/40,1)*.6);
  colors.push(col.r,col.g,col.b);
 }
 g.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
 g.computeVertexNormals();
 const terrainMat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:1});
 terrainMat.onBeforeCompile=sh=>{                       // 苗寨段：暗绿地面染夕照暖光并抬亮
  sh.uniforms.uVilG={value:0};terrainU=sh.uniforms;
  sh.fragmentShader=('uniform float uVilG;\n'+sh.fragmentShader)
   .replace('#include <color_fragment>',`#include <color_fragment>
    diffuseColor.rgb=mix(diffuseColor.rgb,
      diffuseColor.rgb*vec3(1.8,1.75,1.5)+vec3(.09,.10,.065),uVilG);`)  // 以抬亮为主·近中性偏土绿(暖色交给夕照光)
   .replace('#include <emissivemap_fragment>',`#include <emissivemap_fragment>
    totalEmissiveRadiance+=vec3(.05,.05,.032)*uVilG;`);                 // 极轻余温，避免死黑但不再平糊
 };
 scene.add(new THREE.Mesh(g,terrainMat));
}

/* ============================================================
   river 溪流
============================================================ */
const waterU={uT:{value:0},uNight:{value:0},uSec:{value:0},uHigh:{value:0},
 uBeat:{value:0},uFogC:{value:new THREE.Color()},uFogD:{value:.016},uVil:{value:0},uVil2:{value:0},
 uMoon:{value:sunDir.clone()},uApp:{value:1},          // 河流显现度 — 巨雷后1s才现身
 uRip:{value:Array.from({length:6},()=>new THREE.Vector4(0,0,-99,0))}};
{
 const g=new THREE.PlaneGeometry(10.5,420,1,180); g.rotateX(-Math.PI/2);  // 湖面外扩1/2·分段
 {const wp=g.attributes.position;                       // 水面沿河道中心蜿蜒（网格位于 z=-170）
  for(let i=0;i<wp.count;i++)wp.setX(i,wp.getX(i)+riverX(wp.getZ(i)-170));
  wp.needsUpdate=true;}
 const m=new THREE.ShaderMaterial({transparent:true,uniforms:waterU,
  vertexShader:`varying vec3 vW;void main(){vW=(modelMatrix*vec4(position,1.)).xyz;
   gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:GLSL_NOISE+`
  varying vec3 vW;
  uniform float uT,uNight,uSec,uHigh,uBeat,uFogD,uVil,uVil2,uApp;
  uniform vec3 uFogC,uMoon;
  uniform vec4 uRip[6];
  void main(){
   if(uApp<.004)discard;                               // 巨雷前无河
   vec3 deep=mix(vec3(.06,.16,.11),vec3(.01,.05,.035),uNight);
   deep=mix(deep,vec3(.11,.06,.055),uVil*.8);          // 苗寨段夕照暖水色
   deep=mix(deep,vec3(.03,.055,.11),uVil2*.8);         // 第二段：旧暮蓝水色
   vec3 silver=mix(vec3(1.,.95,.8),vec3(.78,.88,.9),uNight);
   silver=mix(silver,vec3(1.,.78,.5),uVil*.5);
   silver=mix(silver,vec3(1.,.85,.6),uVil2*.5);
   vec3 col=deep;
   float n=fbmg(vW.xz*vec2(2.2,.8)+vec2(0.,uT*.7));
   col+=silver*.08*n;
   float spk=pow(noiseg(vW.xz*vec2(9.,4.)+vec2(0.,uT*2.2)),9.);
   col+=silver*spk*1.6*(.3+.7*uSec+.5*uHigh);
   // 月光水路 moonlit path — broken silver toward the moon
   vec2 toP=vW.xz-cameraPosition.xz;
   float dl2=max(length(toP),.001);
   float align=pow(max(dot(toP/dl2,normalize(uMoon.xz)),0.),20.);
   float glit=pow(noiseg(vW.xz*vec2(5.,2.2)+vec2(uT*.9,uT*.13)),5.);
   col+=vec3(.8,.88,1.)*align*(.10+glit*1.5)*uNight*smoothstep(60.,15.,dl2);
   // raindrop rings
   vec2 cell=floor(vW.xz*1.4);
   float ph=uT*.9+hashg(cell)*7.;
   float f=fract(ph);
   vec2 cp=(cell+.5+vec2(hashg(cell+1.3),hashg(cell+2.7))-.5)/1.4;
   float rr=f*.6*(.6+.6*uBeat+.5*uHigh);
   col+=silver*smoothstep(.05,.0,abs(length(vW.xz-cp)-rr))*(1.-f)*.35;
   // 赤足点水 · 银铃落水 — expanding rings from the dancer's touches
   for(int i=0;i<6;i++){
    float age=uT-uRip[i].z;
    if(age>0.&&age<2.2){
     float rr2=length(vW.xz-uRip[i].xy);
     float rad2=.15+age*1.35;
     col+=silver*smoothstep(.16,.02,abs(rr2-rad2))*exp(-age*1.8)*uRip[i].w*.9;
    }
   }
   // 苗寨灯影 — warm lamplight broken on the water (village stretch)
   float vil=smoothstep(-64.,-54.,vW.z)*(1.-smoothstep(24.,30.,vW.z));
   float bank=smoothstep(1.0,2.9,abs(vW.x));
   float str=pow(noiseg(vec2(vW.x*7.,vW.z*.6+uT*.35)),2.)
            *pow(noiseg(vec2(vW.x*3.1+7.,vW.z*.25-uT*.22)),2.);

   .replace('#include <emissivemap_fragment>',`#include <emissivemap_fragment>
